<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Page</title>
    <style>
        /* CSS ส่วนการตกแต่ง */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: #ffffff;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            margin-bottom: 1rem;
            color: #00d2ff;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #ccc;
        }

        .btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 12px 24px;
            background-color: #00d2ff;
            color: #1e1e2f;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.05);
            background-color: #33e0ff;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ยินดีต้อนรับ</h1>
        <p>นี่คือเว็บไซต์เริ่มต้นของคุณที่รันบน GitHub Pages</p>
        <p>คุณสามารถแก้ไขโค้ดนี้เพื่อเพิ่มโปรเจกต์ หรือข้อมูลส่วนตัวได้ทันที</p>
        
        <a href="https://github.com" class="btn">ไปที่ Repository ของฉัน</a>

        <footer>
            สร้างด้วย ❤️ โดย Gemini
        </footer>
    </div>

    <script>
        // JavaScript สำหรับเพิ่มลูกเล่นเล็กน้อย
        console.log("เว็บไซต์โหลดเสร็จสมบูรณ์!");
        
        // ตัวอย่าง: เปลี่ยนสีหัวข้อเมื่อคลิก
        const title = document.querySelector('h1');
        title.addEventListener('click', () => {
            title.style.color = title.style.color === 'rgb(0, 210, 255)' ? '#ff007b' : '#00d2ff';
        });
    </script>
</body>
</html>
