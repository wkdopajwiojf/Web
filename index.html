<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic UI Hacker Background</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #050505;
            overflow: hidden;
            height: 100%;
            font-family: monospace;
        }

        /* Minimal Digital Grid */
        .grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
            pointer-events: none;
        }

        /* Cinematic Soft Blur & Depth of Field Overlay */
        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.8) 100%);
            backdrop-filter: blur(1px); /* Soft blur effect */
            z-index: 3;
            pointer-events: none;
        }

        /* Code Canvas */
        canvas {
            display: block;
            z-index: 2;
            position: relative;
        }

        /* Subtle Glitch Effect */
        .glitch {
            animation: glitch-anim 4s infinite linear;
        }

        @keyframes glitch-anim {
            0%, 96%, 100% { transform: translate(0, 0); opacity: 1; }
            97% { transform: translate(-3px, 2px); opacity: 0.8; filter: drop-shadow(2px 0 0 rgba(255,255,255,0.5)); }
            98% { transform: translate(3px, -2px); opacity: 0.9; }
            99% { transform: translate(-2px, 0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="grid"></div>
    <div class="vignette"></div>
    <canvas id="matrix" class="glitch"></canvas>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        // Make canvas full screen
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Characters for the code stream
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()<>{}[]/\\~';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array.from({ length: columns }).fill(1);

        // Floating Particles
        const particles = Array.from({ length: 60 }).map(() => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            speed: Math.random() * 0.5 + 0.1,
            size: Math.random() * 1.5 + 0.5
        }));

        function draw() {
            // Fading background to create trail effect
            ctx.fillStyle = 'rgba(5, 5, 5, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Set text style (Glowing White)
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#ffffff';
            ctx.font = fontSize + 'px monospace';

            // Draw scrolling code
            for (let i = 0; i < drops.length; i++) {
                // Randomize brightness for depth
                ctx.globalAlpha = Math.random() * 0.5 + 0.5;
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // Reset drop to top randomly to keep continuous loop
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }

            // Draw floating particles
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 12;
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                
                // Move particles slowly upwards
                p.y -= p.speed;
                if (p.y < 0) p.y = canvas.height;
            }

            // Loop animation
            requestAnimationFrame(draw);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        draw();
    </script>

</body>
</html>
